spring:
    
  config:
    import: optional:file:.env[.properties]
  
  application:
    name: condo-swift-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

  jackson:
    time-zone: Asia/Bangkok

  flyway:
    locations: classpath:db/migration
    
# ===============================
# JWT
# ===============================
jwt-secret: ${JWT_SECRET}
jwt-expiration: 604800000

# ===============================
# Supabase
# ===============================
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  bucket:
    announce: announce-images
    profile: profile-picture

# ===============================
# ThaiBulk SMS
# ===============================
thaibulksms:
  key: ${THAIBULKSMS_KEY}
  secret: ${THAIBULKSMS_SECRET}
  request_url: https://otp.thaibulksms.com/v2/otp/request
  verify_url: https://otp.thaibulksms.com/v2/otp/verify

# ===============================
# ThaiBulk Email
# ===============================
thaibulkemail:
  key: ${THAIBULKEMAIL_KEY}
  secret: ${THAIBULKEMAIL_SECRET}
  send_url: https://email-api.thaibulksms.com/email/v1/send_template
  email_sender: ${THAIBULKEMAIL_EMAIL_SENDER}

  verify_email_template_uuid: ${THAIBULKEMAIL_VERIFY_TEMPLATE_UUID}
  reset_password_template_uuid: ${THAIBULKEMAIL_RESET_PASSWORD_TEMPLATE_UUID}

  verify_production_url: ${THAIBULKEMAIL_VERIFY_PRODUCTION_URL}
  verify_dev_url: ${THAIBULKEMAIL_VERIFY_DEV_URL}
  reset_password_url: ${THAIBULKEMAIL_RESET_PASSWORD_URL}

# ===============================
# Stripe
# ===============================
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  success-url: ${STRIPE_SUCCESS_URL}
  cancel-url: ${STRIPE_CANCEL_URL}
